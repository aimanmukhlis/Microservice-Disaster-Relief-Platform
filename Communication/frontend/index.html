<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief System - Communications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:,">
    <link href="dashboard.css" rel="stylesheet">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"></div>
    <ul class="nav flex-column mt-3">
        <li class="nav-item"><a class="nav-link" href="http://localhost:5010/">Reporting</a></li>
        <li class="nav-item"><a class="nav-link" href="http://localhost:9010/">Volunteer Task</a></li>
        <li class="nav-item"><a class="nav-link" href="http://localhost:7010/">Inventory</a></li>
        <li class="nav-item"><a class="nav-link active" href="http://localhost:6010/">Communication</a></li>
    </ul>
</div>

<header class="main-header">
    <div class="d-flex justify-content-between align-items-center w-100">
        <div>
            <h3 class="mb-0 fw-bold">Disaster Relief Coordination Platform</h3>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="dropdown">
                <button class="btn btn-light position-relative rounded-pill fw-semibold shadow-sm" type="button" data-bs-toggle="dropdown" onclick="fetchNotifications()">
                    🔔 Alerts
                    <span class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-white rounded-circle" id="notificationBadge"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow" id="notificationList" style="width:320px;max-height:400px;overflow-y:auto;"></ul>
            </div>
            <button class="btn btn-danger rounded-pill px-4 fw-semibold shadow-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</header>

<main class="main-content">
        
    <div class="mb-4 border-start border-primary border-4 ps-3">
        <h2 class="text-dark fw-bold mb-0">Broadcast Panel</h2>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="custom-card h-100">
                <div class="custom-card-header">
                    <h5 class="mb-0">Broadcast / Send Message</h5>
                </div>
                <div class="card-body p-4">
                    <form id="msg-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">Incident ID Key</label>
                            <input type="text" id="msg-incident" class="form-control bg-light border-0 shadow-sm" placeholder="e.g., INC-099" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">Sender Role</label>
                            <select id="msg-role" class="form-select bg-light border-0 shadow-sm">
                                <option value="NGO">NGO Responder</option>
                                <option value="Government">Government Agency</option>
                                <option value="Victim">Victim / On-Site</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-secondary">Message Content</label>
                            <textarea id="msg-text" class="form-control bg-light border-0 shadow-sm" rows="4" placeholder="Type official alert..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill shadow-sm py-2">Transmit Message</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="custom-card h-100">
                <div class="custom-card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Official Audit History Pipeline</h5>
                    <button class="btn btn-sm btn-outline-primary fw-bold rounded-pill px-3" onclick="fetchHistory()">Refresh Logs</button>
                </div>
                <div class="card-body p-4">
                    <div id="chat-box" class="p-3 bg-light rounded border-0 shadow-sm" style="height: 350px; overflow-y: auto;">
                        <div class="text-center text-muted small mt-4">
                            No incident logs loaded.<br>Select an Incident ID or send a message to fetch logs.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const GATEWAY_URL = 'http://localhost:4000';
    const BACKEND_URL = `${GATEWAY_URL}/api/communications`;

    document.getElementById('msg-form').addEventListener('submit', async(e) => {
        e.preventDefault();

        const incidentId = document.getElementById('msg-incident').value;
        const payload = {
            incidentId: incidentId,
            senderId: "SYS-USER",
            senderRole: document.getElementById('msg-role').value,
            message: document.getElementById('msg-text').value
        };

        try {
            await fetch(`${BACKEND_URL}/send`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            document.getElementById('msg-text').value = '';
            fetchHistory(incidentId);
        } catch (error) {
            console.error("Transmission failed:", error);
            alert("Error sending message. Is your API gateway connected?");
        }
    });

    async function fetchHistory(incId) {
        const id = incId || document.getElementById('msg-incident').value;
        if (!id) return;

        try {
            const res = await fetch(`${BACKEND_URL}/history/${id}`);
            const data = await res.json();

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';

            if (data.length === 0) {
                chatBox.innerHTML = '<div class="text-center text-muted small mt-4">No history found for this incident.</div>';
                return;
            }

            data.forEach(log => {
                chatBox.innerHTML += `
                <div class="mb-3 p-3 rounded bg-white shadow-sm border border-light">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <strong class="text-primary fs-6">[${log.senderRole}]</strong>
                        <span class="text-muted" style="font-size: 11px;">${new Date(log.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="text-dark small">${log.message}</div>
                </div>`;
            });

            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            console.error("Could not fetch history logs:", error);
        }
    }

    function logout() {
        if(confirm("Are you sure you want to logout?")) {
            sessionStorage.clear();
            localStorage.clear();
            window.location.href = "http://localhost:3010/index.html";
        }
    }

    async function fetchNotifications() {
        const list = document.getElementById('notificationList');
        const badge = document.getElementById('notificationBadge');
        if (badge) badge.classList.add('d-none'); 
        list.innerHTML = '<li><span class="dropdown-item text-muted text-center py-3">Loading...</span></li>';
        try {
            const response = await fetch(`${GATEWAY_URL}/api/notifications/history`);
            if (response.ok) {
                const notifications = await response.json();
                list.innerHTML = ''; 
                if (notifications.length === 0) {
                    list.innerHTML = '<li><span class="dropdown-item text-muted text-center py-3">No new alerts.</span></li>';
                } else {
                    notifications.forEach(notif => {
                        const date = new Date(notif.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        list.innerHTML += `
                            <li>
                                <div class="dropdown-item border-bottom py-3 list-group-item-action text-wrap">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <strong>${notif.priority === 'HIGH' ? '<span class="text-danger">🚨 Critical Alert</span>' : '<span class="text-primary">ℹ️ System Update</span>'}</strong>
                                        <span class="badge bg-light text-dark border rounded-pill">${date}</span>
                                    </div>
                                    <p class="mb-0 text-dark small">${notif.message}</p>
                                </div>
                            </li>
                        `;
                    });
                }
            } else { throw new Error('Failed to load'); }
        } catch (error) {
            console.error("Failed to load notifications:", error);
            list.innerHTML = '<li><span class="dropdown-item text-danger text-center py-3">Notification Message Broker is unreachable.</span></li>';
        }
    }
</script>
</body>
</html>
