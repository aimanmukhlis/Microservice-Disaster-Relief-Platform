<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief System - Reporting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link class="icon" href="data:,">

    <style>
        body{ background:#F1F5F9; min-height:100vh; }
        /* HEADER */
        .main-header{ background:linear-gradient(135deg,#0F172A,#1E3A8A); color:white; height:80px; position:fixed; top:0; left:250px; right:0; z-index:1000; display:flex; align-items:center; padding:0 30px; box-shadow:0 3px 10px rgba(0,0,0,0.15); }
        /* SIDEBAR */
        .sidebar{ width:250px; height:100vh; position:fixed; top:0; left:0; background:#1E293B; color:white; z-index:1001; box-shadow:4px 0 15px rgba(0,0,0,0.15); }
        .sidebar-brand{ height:80px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; font-weight:700; background:#0F172A; border-bottom:1px solid rgba(255,255,255,0.1); }
        .sidebar .nav-link{ color:#CBD5E1; padding:15px 25px; font-weight:500; border-radius:10px; margin:5px 10px; transition:all 0.3s ease; }
        .sidebar .nav-link:hover{ background:#3B82F6; color:white; transform:translateX(5px); }
        .sidebar .nav-link.active{ background:#2563EB; color:white; }
        /* MAIN CONTENT */
        .main-content{ margin-left:250px; margin-top:100px; padding:30px; }
        /* CARD */
        .card{ border:none; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.08); }
        .card-header{ background:#EFF6FF; color:#1E40AF; font-weight:bold; }
        /* BUTTONS */
        .btn-primary{ background:#2563EB; border:none; }
        .btn-primary:hover{ background:#1D4ED8; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"></div>
    <ul class="nav flex-column mt-3">
        <li class="nav-item"><a class="nav-link active" href="http://localhost:5010/">Reporting </a></li>
        <li class="nav-item"><a class="nav-link" href="http://localhost:9010/">Volunteer Task </a></li>
        <li class="nav-item"><a class="nav-link" href="http://localhost:7010/">Inventory </a></li>
        <li class="nav-item"><a class="nav-link" href="http://localhost:6010/">Communication </a></li>
    </ul>
</div>

<header class="main-header">
    <div class="d-flex justify-content-between align-items-center w-100">
        <div><h3 class="mb-0 fw-bold">Disaster Relief Coordination Platform</h3></div>
        <div class="d-flex align-items-center gap-3">
            <div class="dropdown">
                <button class="btn btn-light position-relative rounded-pill fw-semibold shadow-sm" type="button" data-bs-toggle="dropdown" onclick="fetchNotifications()">
                    🔔 Alerts
                    <span class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-white rounded-circle" id="notificationBadge"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow" id="notificationList" style="width:320px;max-height:400px;overflow-y:auto;"></ul>
            </div>
            <button class="btn btn-danger rounded-pill px-4 fw-semibold shadow-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</header>

<div class="main-content">
    <div class="mb-4 border-start border-primary border-4 ps-3">
        <h2 class="text-dark fw-bold mb-0">Disaster Reporting Dashboard</h2>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-header bg-white border-bottom py-3">
                    <h5 class="mb-0 text-primary fw-bold">Submit Emergency Report</h5>
                </div>
                <div class="card-body p-4 bg-white">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Disaster Type</label>
                            <select class="form-select bg-light border-0 shadow-sm" id="type" required>
                                <option value="" disabled selected>Select type...</option>
                                <option value="Flood">Flood</option>
                                <option value="Earthquake">Earthquake</option>
                                <option value="Landslide">Landslide</option>
                                <option value="Medical Emergency">Medical Emergency</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Location / Area</label>
                            <input type="text" class="form-control bg-light border-0 shadow-sm" id="location" placeholder="e.g., Kuala Nerus" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Risk Level</label>
                            <select class="form-select bg-light border-0 shadow-sm" id="riskLevel" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <button class="w-100 btn btn-primary btn-lg rounded-pill shadow-sm fw-bold" type="submit">Submit Report</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold m-0">Active Incidents</h5>
                <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="fetchReports()">🔄 Refresh</button>
            </div>
            <div id="reportsContainer" class="row g-3"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GATEWAY_URL = 'http://localhost:4000';
    const API_URL = `${GATEWAY_URL}/api/reports`;

    document.getElementById('reportForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const reportData = {
            type: document.getElementById('type').value,
            location: document.getElementById('location').value,
            riskLevel: document.getElementById('riskLevel').value
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reportData)
            });

            if (response.ok) {
                alert('Incident logged and system notification dispatched successfully!');
                document.getElementById('reportForm').reset();
                fetchReports(); 
            } else {
                const errData = await response.json();
                alert(`Submission denied: ${errData.error}`);
            }
        } catch (error) {
            console.error('Error submitting report:', error);
            alert('Failed to connect to backend through API Gateway.');
        }
    });

    async function fetchReports() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            const container = document.getElementById('reportsContainer');
            container.innerHTML = ''; 

            if (!result.data || result.data.length === 0) {
                container.innerHTML = '<div class="col-12"><p class="text-muted text-center py-4">No active incidents reported yet.</p></div>';
                return;
            }

            result.data.forEach(report => {
                let badgeColor = 'bg-success';
                if (report.riskLevel === 'Medium') badgeColor = 'bg-warning text-dark';
                if (report.riskLevel === 'High') badgeColor = 'bg-danger';

                const cardHtml = `
                    <div class="col-12">
                        <div class="card shadow-sm border-start border-4 border-dark mb-2">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h5 class="card-title fw-bold mb-1">${report.type}</h5>
                                        <p class="card-text text-muted mb-2">📍 ${report.location}</p>
                                    </div>
                                    <span class="badge ${badgeColor} rounded-pill">${report.riskLevel} Priority</span>
                                </div>
                                <div class="d-flex align-items-center mt-2 pt-2 border-top">
                                    <span class="text-muted small me-2">Status:</span>
                                    <select class="form-select form-select-sm w-auto bg-light border-0" onchange="updateStatus('${report._id}', this.value)">
                                        <option value="Pending" ${report.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                        <option value="In Progress" ${report.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                                        <option value="Resolved" ${report.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        } catch (error) {
            console.error('Error fetching reports:', error);
            container.innerHTML = '<div class="col-12"><p class="text-danger text-center">Gateway offline. Cannot fetch data lines.</p></div>';
        }
    }

    async function updateStatus(reportId, newStatus) {
        try {
            const response = await fetch(`${API_URL}/${reportId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            
            if (response.ok) {
                console.log('Status updated successfully across broker streams!');
            } else {
                alert('Failed to update status. Check backend connection configuration.');
                fetchReports(); 
            }
        } catch (error) {
            console.error('Failed to update status:', error);
            alert('Failed to alter incident state parameters.');
        }
    }

    async function fetchNotifications() {
        const list = document.getElementById('notificationList');
        const badge = document.getElementById('notificationBadge');
        if (badge) badge.classList.add('d-none'); 
        list.innerHTML = '<li><span class="dropdown-item text-muted text-center py-3">Loading...</span></li>';
        try {
            const response = await fetch(`${GATEWAY_URL}/api/notifications/history`);
            if (response.ok) {
                const notifications = await response.json();
                list.innerHTML = ''; 
                if (notifications.length === 0) {
                    list.innerHTML = '<li><span class="dropdown-item text-muted text-center py-3">No new system events.</span></li>';
                } else {
                    notifications.forEach(notif => {
                        const date = new Date(notif.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        list.innerHTML += `
                            <li>
                                <div class="dropdown-item border-bottom py-3 list-group-item-action text-wrap">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <strong>${notif.priority === 'HIGH' ? '<span class="text-danger">🚨 Critical Alert</span>' : '<span class="text-primary">ℹ️ System Update</span>'}</strong>
                                        <span class="badge bg-light text-dark border rounded-pill">${date}</span>
                                    </div>
                                    <p class="mb-0 text-dark small">${notif.message}</p>
                                </div>
                            </li>
                        `;
                    });
                }
            } else { throw new Error('Failed to parse history metadata stream.'); }
        } catch (error) {
            console.error("Failed to load notifications:", error);
            list.innerHTML = '<li><span class="dropdown-item text-danger text-center py-3">Notification Broker is unreachable.</span></li>';
        }
    }

    function logout() {
        if(confirm("Are you sure you want to logout?")) {
            sessionStorage.clear();
            window.location.href = "http://localhost:3010/index.html";
        }
    }

    window.onload = fetchReports;
</script>
</body>
</html>
