<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0F172A, #1E3A8A); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        .btn-primary { background: #2563EB; border: none; }
        .btn-primary:hover { background: #1D4ED8; }
    </style>
</head>
<body>

    <div class="card login-card p-5 bg-white">
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: #1E3A8A;">LOGIN</h3>
            <p class="text-muted small">Enter your credentials to access the system</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold text-dark">Email Address</label>
                <input type="email" id="email" class="form-control form-control-lg bg-light border-0 shadow-sm" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-dark">Password</label>
                <input type="password" id="password" class="form-control form-control-lg bg-light border-0 shadow-sm" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm fw-bold py-2 fs-5">Login</button>
        </form>

        <div id="errorMessage" class="text-danger text-center mt-3 d-none fw-bold bg-danger-subtle p-2 rounded"></div>
    </div>

    <script>
        const GATEWAY_URL = 'http://localhost:4000';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.add('d-none');
            
            try {
                const response = await fetch(`${GATEWAY_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Save access credentials to browser session context
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('userName', data.user.name);
                    sessionStorage.setItem('userRole', data.user.role);
                    
                    // ✅ FIXED: Cross over container boundaries directly to Reporting UI (Port 5010)
                    window.location.href = 'http://localhost:5010/index.html'; 
                } else {
                    errorDiv.textContent = data.error || 'Invalid credentials';
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                console.error("Connection error:", err);
                errorDiv.textContent = 'System connection error. API Gateway is currently unreachable.';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
