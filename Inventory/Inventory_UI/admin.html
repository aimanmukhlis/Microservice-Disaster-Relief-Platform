<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
        }
        .card {
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="pb-4 mb-4 border-bottom d-flex align-items-center justify-content-between">
        <div>
            <h1 class="display-6 fw-bold text-dark"><i class="bi bi-box-seam text-primary me-2"></i>Inventory Control</h1>
            <p class="text-muted mb-0">Microservice admin node portal console</p>
        </div>
    </header>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-body p-4">
                    <h3 class="card-title h5 fw-bold mb-4 text-primary" id="form-title">Add New Supply</h3>
                    
                    <form id="inventory-form" class="needs-validation" novalidate>
                        <input type="hidden" id="is-edit-mode" value="false">
                        
                        <div class="mb-3">
                            <label for="itemId" class="form-label fw-semibold text-secondary small">Item ID</label>
                            <input type="text" class="form-control" id="itemId" required placeholder="e.g., F01">
                            <div class="invalid-feedback">Please enter a valid unique ID key string.</div>
                        </div>

                        <div class="mb-3">
                            <label for="itemName" class="form-label fw-semibold text-secondary small">Item Name</label>
                            <input type="text" class="form-control" id="itemName" required placeholder="e.g., Beras Jati">
                        </div>

                        <div class="mb-3">
                            <label for="itemType" class="form-label fw-semibold text-secondary small">Category</label>
                            <select class="form-select text-capitalize" id="itemType" required>
                                <option value="" disabled selected>Select inventory category...</option>
                                <option value="food">food</option>
                                <option value="drink">drink</option>
                                <option value="medicine">medicine</option>
                                <option value="toiletries">toiletries</option>
                                <option value="tools">tools</option>
                                <option value="clothing">clothing</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="quantity" class="form-label fw-semibold text-secondary small">Stock Quantity</label>
                            <input type="number" class="form-control" id="quantity" required min="0" placeholder="0">
                        </div>

                        <div class="mb-4">
                            <label for="location" class="form-label fw-semibold text-secondary small">Logistics Location</label>
                            <input type="text" class="form-control" id="location" required placeholder="e.g., Kedai Apek">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary fw-medium" id="submit-btn">
                                <i class="bi bi-plus-circle me-1"></i> Save Supply Item
                            </button>
                            <button type="button" id="cancel-btn" class="btn btn-outline-secondary fw-medium" style="display:none;">
                                <i class="bi bi-x-circle me-1"></i> Cancel Edit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card h-100">
                <div class="card-header bg-white py-3 border-bottom-0 d-flex align-items-center justify-content-between">
                    <h3 class="h5 fw-bold mb-0 text-dark">Current Stock Inventory</h3>
                    <button class="btn btn-sm btn-outline-primary" onclick="loadInventory()">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-uppercase fs-7 text-secondary">
                                <tr>
                                    <th class="ps-4">ID</th>
                                    <th>Item Details</th>
                                    <th>Category</th>
                                    <th>Quantity</th>
                                    <th>Location</th>
                                    <th class="pe-4 text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body">
                                <tr>
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                        Streaming dynamic structural pipeline records...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Standard normalized API Gateway proxy mapping address
    const API_BASE_URL = 'http://localhost:4000/api/resources/inventory';

    const inventoryForm = document.getElementById('inventory-form');
    const tableBody = document.getElementById('inventory-table-body');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    
    const inputIsEdit = document.getElementById('is-edit-mode');
    const inputId = document.getElementById('itemId');
    const inputName = document.getElementById('itemName');
    const inputType = document.getElementById('itemType');
    const inputQuantity = document.getElementById('quantity');
    const inputLocation = document.getElementById('location');

    // --- 1. FETCH ALL ITEMS (READ) ---
    async function loadInventory() {
        try {
            const response = await fetch(API_BASE_URL);
            if (!response.ok) throw new Error("Could not fetch inventory");
            const data = await response.json();
            
            tableBody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted"><i class="bi bi-folder-x fs-3 d-block mb-2"></i>No data records active inside MongoDB Atlas.</td></tr>`;
                return;
            }

            data.forEach(item => {
                // Safeguard against variations in schema primary keys
                const trackingId = item.itemId || item._id;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="ps-4"><code class="fw-bold">${trackingId}</code></td>
                    <td><span class="fw-semibold text-dark">${escapeHtml(item.itemName)}</span></td>
                    <td><span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle text-uppercase">${item.itemType}</span></td>
                    <td><span class="fw-bold ${item.quantity < 10 ? 'text-danger' : 'text-dark'}">${item.quantity}</span></td>
                    <td><i class="bi bi-geo-alt text-muted me-1"></i>${escapeHtml(item.location)}</td>
                    <td class="pe-4 text-end">
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary" onclick="setupEditForm('${trackingId}', '${escapeHtml(item.itemName)}', '${item.itemType}', ${item.quantity}, '${escapeHtml(item.location)}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-danger" onclick="deleteItem('${trackingId}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error(error);
            tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle fs-3 d-block mb-2"></i>Failed to fetch real-time state array updates via API Gateway.</td></tr>`;
        }
    }

    // --- 2. SUBMIT FORM (CREATE OR UPDATE) ---
    inventoryForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!inventoryForm.checkValidity()) {
            e.stopPropagation();
            inventoryForm.classList.add('was-validated');
            return;
        }

        const payload = {
            itemId: inputId.value,
            itemName: inputName.value,
            itemType: inputType.value,
            quantity: Number(inputQuantity.value),
            location: inputLocation.value
        };

        const isEdit = inputIsEdit.value === 'true';
        const targetUrl = isEdit ? `${API_BASE_URL}/${payload.itemId}` : API_BASE_URL;
        const targetMethod = isEdit ? 'PUT' : 'POST';

        try {
            const response = await fetch(targetUrl, {
                method: targetMethod,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                alert(`Error: ${data.error || 'System operation failure.'}`);
                return;
            }

            resetForm();
            loadInventory();
        } catch (error) {
            alert("Network connection error encountered connecting to backend.");
        }
    });

    // --- 3. DELETE ITEM ---
    async function deleteItem(id) {
        if (!confirm(`Permanently drop tracking context for item: ${id}?`)) return;

        try {
            const response = await fetch(`${API_BASE_URL}/${id}`, { method: 'DELETE' });
            const data = await response.json();

            if (!response.ok) {
                alert(`Error: ${data.error || 'Failed to delete execution.'}`);
                return;
            }

            loadInventory();
        } catch (error) {
            alert("Network dropped executing pipeline changes downstream.");
        }
    }

    // --- FORM STATE CONTROLLERS ---
    function setupEditForm(id, name, type, qty, loc) {
        formTitle.textContent = "Modify Existing Supply";
        formTitle.className = "card-title h5 fw-bold mb-4 text-warning";
        submitBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Update Data Record';
        submitBtn.className = "btn btn-warning fw-medium text-white";
        cancelBtn.style.display = "block";
        
        inputIsEdit.value = "true";
        inputId.value = id;
        inputId.disabled = true; 
        inputName.value = name;
        inputType.value = type;
        inputQuantity.value = qty;
        inputLocation.value = loc;
    }

    function resetForm() {
        formTitle.textContent = "Add New Supply";
        formTitle.className = "card-title h5 fw-bold mb-4 text-primary";
        submitBtn.innerHTML = '<i class="bi bi-plus-circle me-1"></i> Save Supply Item';
        submitBtn.className = "btn btn-primary fw-medium";
        cancelBtn.style.display = "none";
        
        inputIsEdit.value = "false";
        inputId.disabled = false;
        inventoryForm.classList.remove('was-validated');
        inventoryForm.reset();
    }

    cancelBtn.addEventListener('click', resetForm);
    
    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // Initialize display call on render load
    loadInventory();
</script>

</body>
</html>
