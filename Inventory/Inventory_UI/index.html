<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief - User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:,">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Victim / Volunteer Portal</h2>
            <span class="badge bg-info text-dark">Logged in as: Requestor</span>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Find & Request Resources</h5>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-8">
                        <label class="form-label">Item Name (e.g., Water, Medical Kit, Blanket)</label>
                        <input type="text" id="searchKeyword" class="form-control" placeholder="Search for supplies...">
                    </div>
                    <div class="col-md-4 mt-3 mt-md-0">
                        <label class="form-label">Filter by Type</label>
                        <select id="filterType" class="form-select">
                            <option value="">All Types</option>
                            <option value="food">Food</option>
                            <option value="drink">Drink</option>
                            <option value="medicine">Medicine</option>
                            <option value="toiletries">Toiletries</option>
                            <option value="tools">Tools</option>
                            <option value="clothing">Clothing</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="findResources()">Search Supplies</button>
            </div>
        </div>

        <div class="card shadow-sm" id="resultsArea" style="display: none;">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Available Relief Centers</h5>
            </div>
            <div class="card-body">
                <ul class="list-group" id="resultsList"></ul>
            </div>
        </div>
    </div>

    <div class="modal fade" id="requestModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title">Request Supplies</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="requestForm" onsubmit="submitRequest(event)">
                    <div class="modal-body">
                        <input type="hidden" id="modalCenterName">
                        <p><strong>Relief Center:</strong> <span id="displayCenterName"></span></p>
                        <p><strong>Available Stock:</strong> <span id="displayStock"></span></p>
                        
                        <div class="mb-3">
                            <label class="form-label">Quantity Needed</label>
                            <input type="number" id="requestQuantity" class="form-control" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Urgency</label>
                            <select id="requestUrgency" class="form-select">
                                <option value="Low">Low (Within 24 Hours)</option>
                                <option value="High">High (Immediate Need)</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger">Submit Request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // SINGLE ENTRY POINT: API Gateway
        const GATEWAY_URL = 'http://localhost:4000';
        
        let currentItemId = ''; 
        let requestModal; 
        let currentMaxStock = 0; 

        // 1. Find Resources
        function findResources() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            // 🟢 ADDED: Capture the value from the dropdown
            const itemType = document.getElementById('filterType').value;
            
            // 🟢 ADDED: Use URLSearchParams to safely build the query string with both variables
            const queryParams = new URLSearchParams();
            if (keyword) queryParams.append('keyword', keyword);
            if (itemType) queryParams.append('itemType', itemType);

            // 🟢 ADDED: Append the new query string to the fetch URL
            fetch(`${GATEWAY_URL}/api/v1/public/inventory/search?${queryParams.toString()}`)
                .then(response => response.json())
                .then(data => displayResults(data))
                .catch(err => {
                    console.error(err);
                    alert("Error fetching data. Is your API Gateway running on Port 4000?");
                });
        }

        // 2. Display Results
        function displayResults(data) {
            const resultsArea = document.getElementById('resultsArea');
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            if (!data || data.length === 0) {
                resultsList.innerHTML = '<li class="list-group-item text-danger">No matching supplies found.</li>';
            } else {
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    
                    li.innerHTML = `
                        <div>
                            <strong>${item.centerId.name}</strong> <br>
                            <small class="text-muted">Item: ${item.itemName} (${item.itemType})</small> <br>
                            <span class="badge bg-success">Stock: ${item.availableStock}</span>
                        </div>
                        <button class="btn btn-sm btn-warning shadow-sm" 
                            onclick="openModal('${item.itemId}', '${item.centerId.name}', ${item.availableStock})">
                            Request Supply
                        </button>
                    `;
                    resultsList.appendChild(li);
                });
            }
            resultsArea.style.display = 'block';
        }

        // 3. Open Request Modal
        function openModal(itemId, centerName, availableStock) {
            currentItemId = itemId; 
            currentMaxStock = availableStock; 
            
            document.getElementById('modalCenterName').value = centerName;
            document.getElementById('displayCenterName').innerText = centerName;
            document.getElementById('displayStock').innerText = availableStock;
            
            const qtyInput = document.getElementById('requestQuantity');
            qtyInput.setAttribute('max', availableStock);
            qtyInput.value = ''; 

            if (!requestModal) {
                requestModal = new bootstrap.Modal(document.getElementById('requestModal'));
            }
            requestModal.show();
        }

        // 4. Submit the Request
        async function submitRequest(event) {
            event.preventDefault(); 

            const centerName = document.getElementById('modalCenterName').value;
            const quantity = parseInt(document.getElementById('requestQuantity').value);
            const urgency = document.getElementById('requestUrgency').value;

            if(quantity > currentMaxStock) {
                alert("You cannot request more than the available stock.");
                return;
            }

            const requestData = {
                itemId: currentItemId, 
                centerName: centerName,
                quantityNeeded: quantity,
                urgency: urgency 
            };

            try {
                const response = await fetch(`${GATEWAY_URL}/api/v1/public/inventory/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    alert('Request approved! The relief center inventory has been updated.');
                    requestModal.hide(); 
                    findResources(); 
                } else {
                    const errorData = await response.json();
                    alert(`Failed to submit: ${errorData.error || 'Check stock levels.'}`);
                }
            } catch (error) {
                console.error("Error submitting request:", error);
                alert("Cannot connect to API Gateway. Is your router service operational?");
            }
        }
    </script>
</body>
</html>
