<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief - User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Victim / Volunteer Portal</h2>
            <span class="badge bg-info text-dark">Logged in as: Requestor</span>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Find & Request Resources</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Item Name (e.g., Water, Medical Kit, Blanket)</label>
                    <input type="text" id="searchKeyword" class="form-control" placeholder="Search for supplies...">
                </div>
                <button class="btn btn-primary" onclick="findResources()">Search Supplies</button>
            </div>
        </div>

        <div class="card shadow-sm" id="resultsArea" style="display: none;">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Available Relief Centers</h5>
            </div>
            <div class="card-body">
                <ul class="list-group" id="resultsList"></ul>
            </div>
        </div>
    </div>

    <div class="modal fade" id="requestModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title">Request Supplies</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="requestForm">
                        <input type="hidden" id="modalCenterName">
                        <p><strong>Relief Center:</strong> <span id="displayCenterName"></span></p>
                        <p><strong>Available Stock:</strong> <span id="displayStock"></span></p>
                        
                        <div class="mb-3">
                            <label class="form-label">Quantity Needed</label>
                            <input type="number" id="requestQuantity" class="form-control" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Urgency</label>
                            <select id="requestUrgency" class="form-select">
                                <option value="Low">Low (Within 24 Hours)</option>
                                <option value="High">High (Immediate Need)</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="submitRequest()">Submit Request</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 💡 SINGLE ENTRY POINT: Everything goes to Port 8000 now (The API Gateway)
        const GATEWAY_URL = 'http://localhost:4000';
        
        // Global state to track the active item ID selected across functions
        let currentItemId = ''; 
        let requestModal; 

        // 1. Find Resources via API Gateway
        function findResources() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            
            // Route updated to hit the gateway URL, passing the proper backend 'keyword' param
            fetch(`${GATEWAY_URL}/api/v1/public/inventory/search?keyword=${encodeURIComponent(keyword)}`)
                .then(response => response.json())
                .then(data => displayResults(data))
                .catch(err => {
                    console.error(err);
                    alert("Error fetching data. Is your API Gateway running on Port 8000?");
                });
        }

        // 2. Display Results and Map Custom Object Keys Correctly
        function displayResults(data) {
            const resultsArea = document.getElementById('resultsArea');
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            if (!data || data.length === 0) {
                resultsList.innerHTML = '<li class="list-group-item text-danger">No matching supplies found.</li>';
            } else {
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    
                    // Uses 'item.itemId' and 'item.centerId.name' matching your Node.js response format
                    li.innerHTML = `
                        <div>
                            <strong>${item.centerId.name}</strong> <br>
                            <small class="text-muted">Item: ${item.itemName} (${item.itemType})</small> <br>
                            <span class="badge bg-success">Stock: ${item.availableStock}</span>
                        </div>
                        <button class="btn btn-sm btn-warning shadow-sm" 
                            onclick="openModal('${item.itemId}', '${item.centerId.name}', ${item.availableStock})">
                            Request Supply
                        </button>
                    `;
                    resultsList.appendChild(li);
                });
            }
            resultsArea.style.display = 'block';
        }

        // 3. Open Request Modal and Keep Track of custom String ID
        function openModal(itemId, centerName, availableStock) {
            currentItemId = itemId; // Capture the correct custom ID for submission
            
            document.getElementById('modalCenterName').value = centerName;
            document.getElementById('displayCenterName').innerText = centerName;
            document.getElementById('displayStock').innerText = availableStock;
            
            document.getElementById('requestQuantity').setAttribute('max', availableStock);
            document.getElementById('requestQuantity').value = ''; 

            requestModal = new bootstrap.Modal(document.getElementById('requestModal'));
            requestModal.show();
        }

        // 4. Submit the Request through the API Gateway
        async function submitRequest() {
            const centerName = document.getElementById('modalCenterName').value;
            const quantity = document.getElementById('requestQuantity').value;
            const urgency = document.getElementById('requestUrgency').value;

            if(!quantity || quantity <= 0) {
                alert("Please enter a valid quantity.");
                return;
            }

            // Payload properties meticulously matched with your public/request backend expectations
            const requestData = {
                itemId: currentItemId, 
                centerName: centerName,
                quantityNeeded: parseInt(quantity),
                urgency: urgency 
            };

            try {
                // Route explicitly points through the Gateway
                const response = await fetch(`${GATEWAY_URL}/api/v1/public/inventory/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    alert('Request approved! The relief center inventory has been updated.');
                    requestModal.hide(); 
                    findResources(); // Refresh current list view to reflect deducted stock
                } else {
                    const errorData = await response.json();
                    alert(`Failed to submit: ${errorData.error || 'Check stock levels.'}`);
                }
            } catch (error) {
                console.error("Error submitting request:", error);
                alert("Cannot connect to API Gateway. Is your router service operational?");
            }
        }
    </script>
</body>
</html>
